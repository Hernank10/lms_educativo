<!DOCTYPE html>
<html>
<head>
    <title>{{ leccion.titulo }} - LMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>{{ leccion.titulo }}</h1>
        <div class="card">
            <div class="card-body">
                {{ leccion.contenido_html|safe }}
                {% if leccion.url_video %}
                <div class="mt-3">
                    <a href="{{ leccion.url_video }}" target="_blank" class="btn btn-primary">Ver video</a>
                </div>
                {% endif %}
            </div>
        </div>
        <a href="{% url 'cursos:detalle' curso.slug %}" class="btn btn-secondary mt-3">Volver al curso</a>
    </div>
</body>
</html>
